<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Filter &amp; Sort Variation</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="6">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="7">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&amp;family=Inter:wght@400;500;600&amp;family=Reenie+Beanie&amp;display=swap" rel="stylesheet" vid="8">
    
    <script vid="9">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: '#2A2724',
                        paper: '#FDFCF9',
                        parchment: {
                            50: '#FAFAF8',
                            100: '#F0EBE1',
                            DEFAULT: '#F5F2EB',
                            400: '#A8A398',
                            dark: '#D4CFC4',
                        },
                        seal: {
                            red: '#932822',
                            light: '#FDF4F3'
                        },
                        gold: {
                            DEFAULT: '#B08D57',
                            light: '#FBF8F3'
                        },
                        teal: {
                            DEFAULT: '#2A6054'
                        }
                    },
                    fontFamily: {
                        garamond: ['"EB Garamond"', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                        reenie: ['"Reenie Beanie"', 'cursive'],
                    },
                    boxShadow: {
                        'popover': '0 24px 48px -12px rgba(42,39,36,0.15), 0 0 0 1px rgba(42,39,36,0.05), 0 8px 16px rgba(42,39,36,0.08)',
                        'inner-soft': 'inset 0 2px 4px rgba(0,0,0,0.02)'
                    }
                }
            }
        }
    </script>
    <style vid="10">
        body {
            background-color: #F0EBE1; 
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .paper-texture {
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter2)' opacity='0.02'/%3E%3C/svg%3E");
        }

        .hatch-bg {
            background-image: repeating-linear-gradient(45deg, #A8A398 0, #A8A398 0.5px, transparent 0.5px, transparent 6px);
            opacity: 0.05;
        }

        
        #popover-container {
            transform-origin: center bottom;
            opacity: 0;
            transform: translateY(20px) scale(0.96);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #popover-container.is-open {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .anim-item {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #popover-container.is-open .anim-item {
            opacity: 1;
            transform: translateY(0);
        }

        
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.18s; }
        .delay-3 { transition-delay: 0.26s; }
        .delay-4 { transition-delay: 0.34s; }
        .delay-5 { transition-delay: 0.42s; }

        
        .custom-radio input:checked + div {
            border-color: #932822;
        }
        .custom-radio input:checked + div > div {
            background-color: #932822;
            transform: scale(1);
        }
        
        .custom-checkbox input:checked + div {
            background-color: #2A2724;
            border-color: #2A2724;
        }
        .custom-checkbox input:checked + div svg {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body class="text-ink antialiased" vid="11">

    
    <div id="popover-container" class="w-full max-w-[380px] bg-paper rounded-[28px] shadow-popover relative overflow-hidden flex flex-col paper-texture mx-4" vid="12">
        
        
        <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-seal-red/40 to-transparent" vid="13"></div>
        <div class="absolute top-0 right-0 w-32 h-32 bg-seal-light rounded-bl-[100px] -z-10 opacity-50" vid="14"></div>

        
        <header class="pt-7 px-7 pb-4 flex justify-between items-start anim-item delay-1" vid="15">
            <div vid="16">
                <h2 class="font-garamond text-3xl font-medium text-ink leading-none mb-1" vid="17">Curate view</h2>
                <p class="font-inter text-xs text-ink/50 uppercase tracking-widest font-semibold" vid="18">Refine &amp; Organize</p>
            </div>
            <button class="w-8 h-8 rounded-full bg-parchment hover:bg-parchment-100 flex items-center justify-center transition-colors text-ink/60 hover:text-ink" vid="19">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vid="20">
                    <line x1="18" y1="6" x2="6" y2="18" vid="21"></line>
                    <line x1="6" y1="6" x2="18" y2="18" vid="22"></line>
                </svg>
            </button>
        </header>

        
        <div class="px-7 relative anim-item delay-2" vid="23">
            <div class="h-px w-full bg-parchment-100 relative" vid="24"></div>
            <span class="absolute right-7 -top-3 font-reenie text-xl text-parchment-400 bg-paper px-2 transform rotate-2" vid="25">make sense of it</span>
        </div>

        
        <div class="p-7 space-y-8 overflow-y-auto" style="max-height: calc(640px - 180px);" vid="26">
            
            
            <section class="anim-item delay-3" vid="27">
                <div class="flex items-center gap-2 mb-4" vid="28">
                    <svg class="w-4 h-4 text-seal-red" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" vid="29">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" vid="30"></path>
                    </svg>
                    <h3 class="font-inter text-xs uppercase tracking-widest text-ink/60 font-semibold" vid="31">Order By</h3>
                </div>
                
                <div class="space-y-3" vid="32">
                    <label class="custom-radio flex items-center gap-3 cursor-pointer group" vid="33">
                        <input type="radio" name="sort" class="hidden" checked="" vid="34">
                        <div class="w-4 h-4 rounded-full border border-ink/30 flex items-center justify-center transition-colors group-hover:border-seal-red/50" vid="35">
                            <div class="w-2 h-2 rounded-full bg-transparent transform scale-0 transition-all duration-200" vid="36"></div>
                        </div>
                        <span class="font-garamond text-[1.15rem] text-ink group-hover:text-ink transition-colors" vid="37">Utility Score</span>
                        <div class="ml-auto flex gap-0.5" vid="38">
                            <svg class="w-3.5 h-3.5 text-gold" fill="currentColor" viewBox="0 0 24 24" vid="39"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" vid="40"></path></svg>
                        </div>
                    </label>

                    <label class="custom-radio flex items-center gap-3 cursor-pointer group" vid="41">
                        <input type="radio" name="sort" class="hidden" vid="42">
                        <div class="w-4 h-4 rounded-full border border-ink/30 flex items-center justify-center transition-colors group-hover:border-seal-red/50" vid="43">
                            <div class="w-2 h-2 rounded-full bg-transparent transform scale-0 transition-all duration-200" vid="44"></div>
                        </div>
                        <span class="font-garamond text-[1.15rem] text-ink/70 group-hover:text-ink transition-colors" vid="45">Frequency of Use</span>
                    </label>

                    <label class="custom-radio flex items-center gap-3 cursor-pointer group" vid="46">
                        <input type="radio" name="sort" class="hidden" vid="47">
                        <div class="w-4 h-4 rounded-full border border-ink/30 flex items-center justify-center transition-colors group-hover:border-seal-red/50" vid="48">
                            <div class="w-2 h-2 rounded-full bg-transparent transform scale-0 transition-all duration-200" vid="49"></div>
                        </div>
                        <span class="font-garamond text-[1.15rem] text-ink/70 group-hover:text-ink transition-colors" vid="50">Alphabetical (A-Z)</span>
                    </label>
                </div>
            </section>

            
            <section class="anim-item delay-4" vid="51">
                <div class="flex items-center gap-2 mb-4" vid="52">
                    <svg class="w-4 h-4 text-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" vid="53">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" vid="54"></path>
                    </svg>
                    <h3 class="font-inter text-xs uppercase tracking-widest text-ink/60 font-semibold" vid="55">Disciplines</h3>
                </div>

                <div class="flex flex-wrap gap-2" vid="56">
                    <button class="px-3.5 py-1.5 rounded-full border border-ink bg-ink text-white font-inter text-[0.8rem] transition-all hover:bg-ink/90" vid="57">
                        Philosophy
                    </button>
                    <button class="px-3.5 py-1.5 rounded-full border border-parchment-dark/60 bg-transparent text-ink/80 font-inter text-[0.8rem] transition-all hover:border-ink hover:text-ink" vid="58">
                        Systems Thinking
                    </button>
                    <button class="px-3.5 py-1.5 rounded-full border border-ink bg-ink text-white font-inter text-[0.8rem] transition-all hover:bg-ink/90" vid="59">
                        Strategy
                    </button>
                    <button class="px-3.5 py-1.5 rounded-full border border-parchment-dark/60 bg-transparent text-ink/80 font-inter text-[0.8rem] transition-all hover:border-ink hover:text-ink" vid="60">
                        Economics
                    </button>
                    <button class="px-3.5 py-1.5 rounded-full border border-parchment-dark/60 bg-transparent text-ink/80 font-inter text-[0.8rem] transition-all hover:border-ink hover:text-ink border-dashed" vid="61">
                        + Show all
                    </button>
                </div>
            </section>

            
            <section class="anim-item delay-5 relative p-4 rounded-2xl border border-parchment-100 bg-parchment-50 shadow-inner-soft overflow-hidden" vid="62">
                <div class="absolute inset-0 hatch-bg" vid="63"></div>
                <div class="relative z-10 space-y-3" vid="64">
                    <label class="custom-checkbox flex items-center gap-3 cursor-pointer group" vid="65">
                        <input type="checkbox" class="hidden" checked="" vid="66">
                        <div class="w-4 h-4 rounded flex items-center justify-center border border-ink/30 transition-colors bg-white" vid="67">
                            <svg class="w-3 h-3 text-white opacity-0 transform scale-50 transition-all duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" vid="68">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" vid="69"></path>
                            </svg>
                        </div>
                        <span class="font-garamond text-[1.1rem] text-ink group-hover:text-ink" vid="70">Has Field Notes</span>
                    </label>

                    <label class="custom-checkbox flex items-center gap-3 cursor-pointer group" vid="71">
                        <input type="checkbox" class="hidden" vid="72">
                        <div class="w-4 h-4 rounded flex items-center justify-center border border-ink/30 transition-colors bg-white group-hover:border-ink/60" vid="73">
                            <svg class="w-3 h-3 text-white opacity-0 transform scale-50 transition-all duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" vid="74">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" vid="75"></path>
                            </svg>
                        </div>
                        <span class="font-garamond text-[1.1rem] text-ink/70 group-hover:text-ink" vid="76">Highly Interlinked</span>
                    </label>
                </div>
            </section>
        </div>

        
        <footer class="p-5 border-t border-parchment-100 bg-paper flex items-center justify-between anim-item delay-5 relative z-20" vid="77">
            <button class="font-inter text-sm text-ink/50 hover:text-seal-red transition-colors font-medium decoration-1 underline-offset-4 hover:underline" vid="78">
                Clear filters
            </button>
            <button class="bg-ink text-white font-inter text-sm font-medium px-5 py-2.5 rounded-xl shadow-[0_4px_12px_rgba(42,39,36,0.2)] hover:bg-[#1a1816] hover:shadow-[0_6px_16px_rgba(42,39,36,0.25)] transition-all flex items-center gap-2 group transform active:scale-95" vid="79">
                <span vid="80">Show 14 Results</span>
                <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" vid="81">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" vid="82"></path>
                </svg>
            </button>
        </footer>
    </div>

    <script vid="83">
        
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('popover-container').classList.add('is-open');
            }, 100);
        });
    </script>

</body></html>
