<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">The Rolodex Viewer</title>
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&amp;family=Reenie+Beanie&amp;display=swap" rel="stylesheet" vid="7">
    
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="8"></script>
    <script vid="9">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#fdfbf7', 
                        ink: '#2a2724',   
                        seal: '#b83a26',  
                        gold: '#d4af37',  
                        teal: '#2a7a7a',  
                        cardwhite: '#ffffff',
                    },
                    fontFamily: {
                        serif: ['"EB Garamond"', 'serif'],
                        hand: ['"Reenie Beanie"', 'cursive'],
                    },
                    boxShadow: {
                        'theatrical': '0 25px 50px -12px rgba(42, 39, 36, 0.15), 0 0 0 1px rgba(42, 39, 36, 0.05)',
                        'modal': '0 0 0 100vmax rgba(42, 39, 36, 0.8), 0 25px 50px -12px rgba(0, 0, 0, 0.5)',
                    }
                }
            }
        }
    </script>
    
    <style vid="10">
        
        body {
            font-family: 'EB Garamond', serif;
            background-color: #fdfbf7;
            color: #2a2724;
            
            overflow: hidden; 
        }

        
        .sc {
            font-family: 'EB Garamond', serif;
            font-variant: small-caps;
            letter-spacing: 0.06em;
            text-transform: lowercase; 
        }

        
        .scene {
            perspective: 2500px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: left;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        
        .is-flipping-next { transform: rotateY(-180deg); }
        .is-flipping-prev { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background-color: #ffffff;
            
        }

        .card-back {
            transform: rotateY(180deg);
        }

        
        #modal {
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        #modal.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #modal:not(.hidden) {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .modal-content {
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: scale(0.95) translateY(20px);
        }
        #modal:not(.hidden) .modal-content {
            transform: scale(1) translateY(0);
        }

        
        ::selection {
            background-color: #d4af37;
            color: #ffffff;
        }
    </style>
</head>
<body class="w-screen h-screen relative flex flex-col items-center justify-center" vid="11">

    
    <svg class="pointer-events-none fixed inset-0 z-50 w-full h-full" style="opacity: 0.04;" vid="12">
        <filter id="fractal-noise" vid="13">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" vid="14"></feTurbulence>
        </filter>
        <rect width="100%" height="100%" filter="url(#fractal-noise)" vid="15"></rect>
    </svg>

    
    <header class="absolute top-0 left-0 w-full p-8 flex justify-between items-start z-10" vid="16">
        <div class="flex flex-col gap-1" vid="17">
            <span class="sc text-ink text-lg font-medium tracking-widest" vid="18">Archive</span>
            <span class="sc text-ink/50 text-sm" vid="19">System Vol. IV</span>
        </div>
        
        <nav class="flex gap-12" vid="20">
            <button class="sc text-ink hover:text-seal transition-colors duration-300 text-base" vid="21">Index</button>
            <button class="sc text-seal transition-colors duration-300 text-base relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-full after:h-px after:bg-seal" vid="22">Rolodex</button>
            <button class="sc text-ink hover:text-seal transition-colors duration-300 text-base" vid="23">Exhibits</button>
        </nav>
        
        <div class="flex items-center gap-2" vid="24">
            <span class="sc text-ink/40 text-sm" vid="25">Folio</span>
            <span class="sc text-gold text-lg" id="counter" vid="26">01 / 05</span>
        </div>
    </header>

    
    <main class="relative z-20 flex items-center justify-center w-full max-w-7xl mx-auto px-12 h-[600px] mt-12 scene" vid="27">
        
        
        <button onclick="navigate(-1)" class="group absolute left-12 p-4 text-ink/30 hover:text-seal transition-colors duration-300 focus:outline-none z-30" aria-label="Previous Quote" vid="28">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="transform transition-transform group-hover:-translate-x-2" vid="29">
                <line x1="19" y1="12" x2="5" y2="12" vid="30"></line>
                <polyline points="12 19 5 12 12 5" vid="31"></polyline>
            </svg>
            <span class="sc absolute -top-6 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity text-seal text-xs whitespace-nowrap" vid="32">Previous</span>
        </button>

        
        <div class="w-full max-w-4xl h-full perspective-container" style="perspective: 2500px;" vid="33">
            <div id="card-inner" class="card-inner shadow-theatrical rounded-sm bg-cardwhite border border-ink/5" onclick="openModal()" vid="34">
                
                
                <div id="card-front" class="card-face p-16 flex flex-col justify-between rounded-sm" vid="35">
                    
                </div>

                
                <div id="card-back" class="card-face card-back p-16 flex flex-col justify-between rounded-sm" vid="36">
                    
                </div>

            </div>
        </div>

        
        <button onclick="navigate(1)" class="group absolute right-12 p-4 text-ink/30 hover:text-seal transition-colors duration-300 focus:outline-none z-30" aria-label="Next Quote" vid="37">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="transform transition-transform group-hover:translate-x-2" vid="38">
                <line x1="5" y1="12" x2="19" y2="12" vid="39"></line>
                <polyline points="12 5 19 12 12 19" vid="40"></polyline>
            </svg>
            <span class="sc absolute -top-6 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity text-seal text-xs whitespace-nowrap" vid="41">Next</span>
        </button>

    </main>

    
    <footer class="absolute bottom-12 left-0 w-full flex justify-center z-10 pointer-events-none" vid="42">
        <span class="sc text-ink/40 text-sm tracking-widest flex items-center gap-4" vid="43">
            <span class="w-8 h-px bg-ink/20 block" vid="44"></span>
            Click card for details
            <span class="w-8 h-px bg-ink/20 block" vid="45"></span>
        </span>
    </footer>

    
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center hidden" style="background-color: rgba(253, 251, 247, 0.95);" vid="46">
        
        <svg class="pointer-events-none absolute inset-0 z-0 w-full h-full" style="opacity: 0.04;" vid="47">
            <rect width="100%" height="100%" filter="url(#fractal-noise)" vid="48"></rect>
        </svg>

        <button onclick="closeModal()" class="absolute top-12 right-12 p-4 text-ink/50 hover:text-seal transition-colors z-20 group" vid="49">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="transform group-hover:rotate-90 transition-transform duration-500" vid="50">
                <line x1="18" y1="6" x2="6" y2="18" vid="51"></line>
                <line x1="6" y1="6" x2="18" y2="18" vid="52"></line>
            </svg>
            <span class="sc absolute -bottom-6 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity text-seal text-xs" vid="53">Close</span>
        </button>

        <div class="modal-content relative z-10 max-w-2xl w-full bg-cardwhite shadow-2xl border border-ink/10 p-16 flex flex-col gap-8" vid="54">
            <div class="flex justify-between items-start border-b border-ink/10 pb-8" vid="55">
                <div vid="56">
                    <h3 class="sc text-seal text-sm mb-2" vid="57">Primary Subject</h3>
                    <h2 id="modal-author" class="text-3xl font-medium text-ink" vid="58"></h2>
                </div>
                <div class="text-right" vid="59">
                    <h3 class="sc text-ink/40 text-sm mb-2" vid="60">Catalog No.</h3>
                    <span id="modal-id" class="sc text-gold text-lg" vid="61"></span>
                </div>
            </div>
            
            <div class="space-y-6" vid="62">
                <p id="modal-quote" class="text-2xl leading-relaxed italic text-ink/90" vid="63"></p>
                
                <div class="grid grid-cols-2 gap-8 pt-8 border-t border-ink/5" vid="64">
                    <div vid="65">
                        <h4 class="sc text-ink/40 text-xs mb-3" vid="66">Origin Context</h4>
                        <p id="modal-source" class="text-base text-ink leading-relaxed" vid="67"></p>
                    </div>
                    <div vid="68">
                        <h4 class="sc text-ink/40 text-xs mb-3" vid="69">Curator's Note</h4>
                        <p id="modal-note" class="font-hand text-2xl text-teal leading-tight transform -rotate-1" vid="70"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script vid="71">
        
        const entries = [
            {
                id: "ITEM-042",
                quote: "The details are not the details. They make the design.",
                author: "Charles Eames",
                source: "From his reflections on industrial production, emphasizing that micro-decisions dictate the macro-experience of an object.",
                date: "Circa 1950",
                note: "Review structural integrity of the base models in relation to this.",
                category: "Design Philosophy"
            },
            {
                id: "ITEM-118",
                quote: "I am going to make everything around me beautiful—that will be my life.",
                author: "Elsie de Wolfe",
                source: "Considered the first modern interior decorator, rejecting dark Victorian aesthetics for light, air, and simplicity.",
                date: "1913",
                note: "Apply this mindset to the new cream palette.",
                category: "Aesthetics"
            },
            {
                id: "ITEM-089",
                quote: "Simplicity is not the goal. It is the by-product of a good idea and modest expectations.",
                author: "Paul Rand",
                source: "A cornerstone thought from one of the most influential graphic designers of the 20th century.",
                date: "1980",
                note: "Remind the team: stop adding features just to have them.",
                category: "Methodology"
            },
            {
                id: "ITEM-204",
                quote: "To create, one must first question everything.",
                author: "Eileen Gray",
                source: "Architect and furniture designer who pioneered the Modern Movement alongside Le Corbusier.",
                date: "1929",
                note: "Her lacquer work is phenomenal. Investigate textures.",
                category: "Process"
            },
            {
                id: "ITEM-011",
                quote: "Space and light and order. Those are the things that men need just as much as they need bread or a place to sleep.",
                author: "Le Corbusier",
                source: "From 'Towards a New Architecture', defining the modernist approach to living spaces.",
                date: "1923",
                note: "Ensure whitespace in the layouts breathes.",
                category: "Architecture"
            }
        ];

        let currentIndex = 0;
        let isAnimating = false;

        
        function createCardHTML(entry) {
            return `
                <div class="flex justify-between items-start w-full">
                    <span class="sc text-seal text-sm tracking-widest">${entry.category}</span>
                    <span class="sc text-ink/30 text-sm tracking-widest">${entry.date}</span>
                </div>
                
                <div class="flex-grow flex items-center justify-center px-12 py-8">
                    <h2 class="text-4xl lg:text-5xl leading-tight text-center text-ink font-medium tracking-tight">
                        “${entry.quote}”
                    </h2>
                </div>
                
                <div class="flex justify-between items-end w-full relative">
                    <div class="flex flex-col gap-1">
                        <span class="sc text-ink/40 text-xs">Attributed to</span>
                        <span class="sc text-gold text-2xl">${entry.author}</span>
                    </div>
                    
                    <!-- Handwritten note overlay, slightly rotated for realism -->
                    <div class="absolute -right-8 bottom-4 max-w-[200px] transform rotate-3">
                        <p class="font-hand text-3xl text-teal leading-none opacity-90">${entry.note}</p>
                    </div>
                </div>
            `;
        }

        function updateCounter() {
            const counter = document.getElementById('counter');
            counter.innerText = `0${currentIndex + 1} / 0${entries.length}`;
        }

        
        function init() {
            document.getElementById('card-front').innerHTML = createCardHTML(entries[currentIndex]);
            updateCounter();
        }

        
        function navigate(direction) {
            if (isAnimating) return;
            isAnimating = true;

            let newIndex = currentIndex + direction;
            if (newIndex < 0) newIndex = entries.length - 1;
            if (newIndex >= entries.length) newIndex = 0;

            const cardInner = document.getElementById('card-inner');
            const cardFront = document.getElementById('card-front');
            const cardBack = document.getElementById('card-back');

            
            cardBack.innerHTML = createCardHTML(entries[newIndex]);

            
            const flipClass = direction > 0 ? 'is-flipping-next' : 'is-flipping-prev';
            
            
            
            
            cardInner.classList.add(flipClass);

            
            setTimeout(() => {
                
                cardFront.innerHTML = createCardHTML(entries[newIndex]);
                
                
                cardInner.style.transition = 'none';
                cardInner.classList.remove(flipClass);
                
                
                void cardInner.offsetWidth;
                
                
                cardInner.style.transition = '';
                
                currentIndex = newIndex;
                updateCounter();
                isAnimating = false;
            }, 800);
        }

        
        function openModal() {
            if (isAnimating) return; 
            
            const entry = entries[currentIndex];
            
            document.getElementById('modal-author').innerText = entry.author;
            document.getElementById('modal-id').innerText = entry.id;
            document.getElementById('modal-quote').innerHTML = `“${entry.quote}”`;
            document.getElementById('modal-source').innerText = entry.source;
            document.getElementById('modal-note').innerText = entry.note;

            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
        }

        
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal').classList.contains('hidden')) {
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openModal();
                }
            } else {
                if (e.key === 'Escape') closeModal();
            }
        });

        
        window.onload = init;
    </script>

</body></html>
